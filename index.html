<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Happy Birthday ❤️</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

    <!-- ========================= -->
    <!-- Night Sky -->
    <!-- ========================= -->

    <div class="stars"></div>

    <div class="shooting-stars">

        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>

    </div>

    <!-- ========================= -->
    <!-- Moon -->
    <!-- ========================= -->

    <div class="moon">

        <div class="crater c1"></div>
        <div class="crater c2"></div>
        <div class="crater c3"></div>

    </div>

    <!-- ========================= -->
    <!-- Balloons -->
    <!-- ========================= -->

    <div class="balloons">

        <div class="balloon red"></div>

        <div class="balloon blue"></div>

        <div class="balloon green"></div>

        <div class="balloon yellow"></div>

        <div class="balloon pink"></div>

    </div>

    <!-- ========================= -->
    <!-- Fireworks -->
    <!-- ========================= -->

    <canvas id="fireworks"></canvas>

    <!-- ========================= -->
    <!-- Birthday Card -->
    <!-- ========================= -->

    <div class="container">

        <h1>
            Happy Birthday 🎂
        </h1>

        <h2>
            Dear Best Friend ❤️
        </h2>

        <p id="introText">

            Someone made a special surprise just for you...

        </p>

        <!-- Gift -->

        <div class="gift" id="giftBox">

            <div class="gift-lid"></div>

            <div class="gift-box"></div>

            <div class="gift-ribbon-v"></div>

            <div class="gift-ribbon-h"></div>

        </div>

        <button id="surpriseBtn">

            Open Your Surprise 🎁

        </button>

    </div>

    <!-- ========================= -->
    <!-- Cake -->
    <!-- ========================= -->

    <div class="cake">

        <div class="candle">

            <div class="flame"></div>

        </div>

        <div class="layer top"></div>

        <div class="layer middle"></div>

        <div class="layer bottom"></div>

    </div>

    <!-- Music -->

    <audio id="birthdayMusic" preload="auto" loop>
    <source src="assets/birthday.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>

</body>

</html>
